{% extends 'base.html' %}

{% block content %}
<div class="mb-4">
    <h3><i class="fas fa-brain me-2 text-primary"></i> Model Training</h3>
    <p class="text-muted">Configure your model parameters and target variable.</p>
</div>

<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card p-4">
            <form action="{{ url_for('train_model') }}" method="POST">
                
                <div class="mb-4">
                    <label class="form-label fw-bold">1. Select Problem Type</label>
                    <select name="problem_type" id="problemType" class="form-select" required>
                        <option value="classification">Classification</option>
                        <option value="regression">Regression</option>
                        <option value="clustering">Clustering (Unsupervised)</option>
                    </select>
                </div>

                <div class="mb-4" id="targetGroup">
                    <label class="form-label fw-bold">2. Select Target Column (y)</label>
                    <select name="target" class="form-select">
                        {% for col in columns %}
                        <option value="{{ col }}">{{ col }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">3. Choose Algorithm</label>
                    <select name="model" id="modelSelect" class="form-select" required>
                        <!-- Options will be populated by JS -->
                    </select>
                </div>

                <div class="alert alert-info py-2">
                    <i class="fas fa-info-circle me-1"></i> Data will be split 80% Train / 20% Test automatically.
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 shadow">
                    <i class="fas fa-play-circle me-2"></i> Start Training Pipeline
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const algorithms = {
        classification: [
            { id: 'logistic', name: 'Logistic Regression' },
            { id: 'knn', name: 'K-Nearest Neighbors' },
            { id: 'svm', name: 'Support Vector Machine' }
        ],
        regression: [
            { id: 'linear', name: 'Linear Regression' },
            { id: 'rf', name: 'Random Forest Regressor' }
        ],
        clustering: [
            { id: 'kmeans', name: 'K-Means Clustering' },
            { id: 'hierarchical', name: 'Hierarchical Clustering' }
        ]
    };

    const problemTypeEl = document.getElementById('problemType');
    const modelSelectEl = document.getElementById('modelSelect');
    const targetGroup = document.getElementById('targetGroup');

    function updateModels() {
        const type = problemTypeEl.value;
        const models = algorithms[type];
        
        modelSelectEl.innerHTML = '';
        models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.name;
            modelSelectEl.appendChild(opt);
        });

        if (type === 'clustering') {
            targetGroup.style.display = 'none';
        } else {
            targetGroup.style.display = 'block';
        }
    }

    problemTypeEl.addEventListener('change', updateModels);
    updateModels(); // Initial call
</script>
{% endblock %}
