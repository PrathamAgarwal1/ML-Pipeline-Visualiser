{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-chart-pie me-2 text-primary"></i> Data Analysis Dashboard</h3>
    <a href="{{ url_for('train_page') }}" class="btn btn-primary btn-sm">Move to Training <i class="fas fa-arrow-right ms-2"></i></a>
</div>

<div class="row">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header">Statistical Summary</div>
            <div class="card-body p-0 overflow-auto" style="max-height: 400px;">
                {{ stats | safe }}
            </div>
        </div>
    </div>
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">Correlation Heatmap</div>
            <div class="card-body text-center">
                <img src="data:image/png;base64,{{ heatmap }}" class="img-fluid rounded" alt="Heatmap">
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">Variable Visualizer</div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label small">Plot Type</label>
                        <select id="plotType" class="form-select form-select-sm">
                            <option value="histogram">Histogram</option>
                            <option value="boxplot">Boxplot</option>
                            <option value="scatter">Scatter Plot</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Column 1 (X)</label>
                        <select id="col1" class="form-select form-select-sm">
                            {% for col in columns %}
                            <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3" id="col2Group" style="display:none;">
                        <label class="form-label small">Column 2 (Y)</label>
                        <select id="col2" class="form-select form-select-sm">
                            {% for col in columns %}
                            <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button id="generatePlot" class="btn btn-primary btn-sm w-100">Generate Plot</button>
                    </div>
                </div>
                <div id="plotResult" class="text-center mt-3">
                    <div class="text-muted p-5">Select options and click Generate</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('plotType').addEventListener('change', function() {
        if (this.value === 'scatter') {
            document.getElementById('col2Group').style.display = 'block';
        } else {
            document.getElementById('col2Group').style.display = 'none';
        }
    });

    document.getElementById('generatePlot').addEventListener('click', async function() {
        const plotType = document.getElementById('plotType').value;
        const col1 = document.getElementById('col1').value;
        const col2 = document.getElementById('col2').value;

        const formData = new FormData();
        formData.append('plot_type', plotType);
        formData.append('col1', col1);
        formData.append('col2', col2);

        document.getElementById('plotResult').innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>';

        const response = await fetch('/get_plot', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        document.getElementById('plotResult').innerHTML = `<img src="${data.plot_url}" class="img-fluid rounded" alt="Dynamic Plot">`;
    });
</script>
{% endblock %}
