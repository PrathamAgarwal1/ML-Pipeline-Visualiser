<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Pipeline Visualizer</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

    <div class="wrapper d-flex">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-microchip me-2"></i> ML Pipeline
            </div>

            <ul class="list-unstyled components">
                <li class="{% if request.path == '/' %}active{% endif %}">
                    <a href="{{ url_for('index') }}"><i class="fas fa-home"></i> Home</a>
                </li>
                <li class="{% if request.path == '/preprocessing' %}active{% endif %}">
                    <a href="{{ url_for('preprocessing') }}"><i class="fas fa-broom"></i> Preprocessing</a>
                </li>
                <li class="{% if request.path == '/analysis' %}active{% endif %}">
                    <a href="{{ url_for('analysis') }}"><i class="fas fa-chart-line"></i> Analysis</a>
                </li>
                <li class="{% if request.path == '/train_page' %}active{% endif %}">
                    <a href="{{ url_for('train_page') }}"><i class="fas fa-brain"></i> Training</a>
                </li>
                <li class="{% if request.path == '/evaluation' %}active{% endif %}">
                    <a href="{{ url_for('evaluation') }}"><i class="fas fa-vial"></i> Evaluation</a>
                </li>
                <li class="{% if request.path == '/prediction' %}active{% endif %}">
                    <a href="{{ url_for('prediction') }}"><i class="fas fa-magic"></i> Prediction</a>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light bg-transparent mb-4">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-primary d-lg-none">
                        <i class="fas fa-align-left"></i>
                    </button>
                    <div class="ms-auto d-flex align-items-center">
                        <span class="text-muted small me-3">Dataset: <strong>{{ session.get('dataset_name', 'None') }}</strong></span>
                        <div class="vr me-3"></div>
                        <img src="https://ui-avatars.com/api/?name=User&background=4361ee&color=fff" class="rounded-circle" width="35" alt="Profile">
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Placeholder for future JS
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
